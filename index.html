<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Forest Guardian</title>
<style>
  :root{
    --canopy-dark:#0d1f14;
    --canopy-mid:#173822;
    --moss:#2f5d3a;
    --fern:#4f8b5a;
    --fog:#a9c9ad;
    --amber:#e2a83f;
    --ember:#d9662b;
    --blood:#c23b3b;
    --parchment:#eee6d3;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#050a07;
    font-family: 'Georgia', 'Times New Roman', serif;
    touch-action:none;
    user-select:none;
  }
  #wrap{
    position:relative; width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  canvas{
    display:block;
    background:var(--canopy-dark);
    max-width:100%; max-height:100%;
    image-rendering: optimizeSpeed;
  }
  #hud{
    position:absolute; top:0; left:0; right:0;
    padding:14px 18px;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none;
    color:var(--parchment);
    font-size:14px;
    letter-spacing:0.5px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.7);
  }
  #hpBarOuter{
    width:160px; height:14px; border:2px solid var(--parchment);
    border-radius:3px; overflow:hidden; background:rgba(0,0,0,0.4);
    margin-top:6px;
  }
  #hpBarInner{
    height:100%; width:100%;
    background: linear-gradient(90deg, var(--blood), var(--ember));
    transition: width 0.15s ease;
  }
  #waveTag{
    background: rgba(13,31,20,0.6);
    border:1px solid var(--amber);
    padding:6px 12px;
    border-radius:20px;
    font-weight:bold;
    color:var(--amber);
  }
  #hudLogos{
    display:flex;
    gap:8px;
    margin-top:8px;
  }
  #hudLogos img{
    width:38px; height:38px;
    object-fit:contain;
    border-radius:8px;
    background:rgba(13,31,20,0.55);
    border:1px solid rgba(226,168,63,0.5);
    padding:3px;
    box-shadow:0 2px 8px rgba(0,0,0,0.5);
  }
  #centerMsg{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    text-align:center; color:var(--parchment);
    pointer-events:none;
  }
  #centerMsg h1{
    font-size:clamp(28px,6vw,52px);
    margin:0 0 8px 0;
    color:var(--amber);
    text-shadow: 0 3px 12px rgba(0,0,0,0.8);
    letter-spacing:2px;
  }
  #centerMsg p{
    font-size:clamp(13px,2.4vw,17px);
    margin:6px 0;
    opacity:0.9;
  }
  #startBtn, #restartBtn{
    pointer-events:auto;
    margin-top:16px;
    background: linear-gradient(180deg, var(--fern), var(--moss));
    border:2px solid var(--amber);
    color:var(--parchment);
    padding:12px 30px;
    font-size:16px;
    font-family:inherit;
    border-radius:8px;
    cursor:pointer;
    box-shadow:0 4px 0 #12281a, 0 6px 14px rgba(0,0,0,0.5);
  }
  #startBtn:active, #restartBtn:active{
    transform:translateY(3px);
    box-shadow:0 1px 0 #12281a;
  }
  #diffRow{
    pointer-events:auto;
    display:flex;
    gap:12px;
    justify-content:center;
    margin-top:14px;
  }
  .diffBtn{
    font-family:inherit;
    font-size:14px;
    font-weight:bold;
    letter-spacing:0.5px;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    background: rgba(13,31,20,0.55);
    border:2px solid rgba(238,230,211,0.35);
    color:var(--fog);
    box-shadow:0 3px 0 rgba(0,0,0,0.4);
    transition: transform 0.08s ease;
  }
  .diffBtn:active{ transform:translateY(2px); }
  .diffBtn.selected{
    color:var(--parchment);
  }
  .diffBtn.selected[data-diff="easy"]{
    background: linear-gradient(180deg, var(--fern), var(--moss));
    border-color:var(--fern);
  }
  .diffBtn.selected[data-diff="hard"]{
    background: linear-gradient(180deg, var(--ember), var(--blood));
    border-color:var(--blood);
  }
  .hidden{ display:none !important; }

  /* touch controls */
  #touchControls{
    position:absolute; bottom:0; left:0; right:0;
    display:none;
    justify-content:space-between;
    align-items:flex-end;
    padding:22px;
    pointer-events:none;
  }
  #joyZone{
    width:150px; height:150px; border-radius:50%;
    background:rgba(238,230,211,0.08);
    border:2px solid rgba(238,230,211,0.35);
    position:relative;
    pointer-events:auto;
    touch-action:none;
  }
  #joyStick{
    width:56px; height:56px; border-radius:50%;
    background:rgba(226,168,63,0.85);
    position:absolute; top:47px; left:47px;
    box-shadow:0 2px 8px rgba(0,0,0,0.5);
    pointer-events:none;
  }
  #attackBtn{
    width:92px; height:92px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--ember), var(--blood));
    border:3px solid var(--amber);
    color:var(--parchment);
    font-weight:bold; font-size:13px;
    pointer-events:auto;
    touch-action:none;
    box-shadow:0 4px 10px rgba(0,0,0,0.5);
  }
  #hint{
    position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
    color:var(--fog); font-size:12px; opacity:0.7; pointer-events:none;
    text-align:center;
  }
</style>
</head>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const hpBar = document.getElementById('hpBarInner');
  const scoreVal = document.getElementById('scoreVal');
  const waveTag = document.getElementById('waveTag');
  const centerMsg = document.getElementById('centerMsg');
  const msgTitle = document.getElementById('msgTitle');
  const msgSub = document.getElementById('msgSub');
  const msgSub2 = document.getElementById('msgSub2');
  const startBtn = document.getElementById('startBtn');
  const diffButtons = document.querySelectorAll('.diffBtn');
  const touchControls = document.getElementById('touchControls');
  const joyZone = document.getElementById('joyZone');
  const joyStick = document.getElementById('joyStick');
  const attackBtn = document.getElementById('attackBtn');

  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  let W, H, DPR;
  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    const vw = Math.min(window.innerWidth, 900);
    const vh = window.innerHeight;
    W = vw; H = vh;
    canvas.style.width = W+'px';
    canvas.style.height = H+'px';
    canvas.width = Math.floor(W*DPR);
    canvas.height = Math.floor(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  if(isTouch){
    touchControls.style.display = 'flex';
    msgSub2.textContent = 'Joystick kiri untuk gerak, tombol TEMBAK untuk menembak musuh terdekat.';
  }

  // ---------- Forest background layers ----------
  const trees = [];
  function genTrees(){
    trees.length = 0;
    for(let layer=0; layer<3; layer++){
      const count = 14 + layer*4;
      for(let i=0;i<count;i++){
        trees.push({
          layer,
          x: Math.random()*2000 - 500,
          y: Math.random()*2000 - 500,
          r: 40 + layer*22 + Math.random()*20,
          hue: layer
        });
      }
    }
  }
  genTrees();

  // firefly particles
  const fireflies = [];
  for(let i=0;i<26;i++){
    fireflies.push({
      x: Math.random()*2000-500, y: Math.random()*2000-500,
      t: Math.random()*Math.PI*2, speed: 0.5+Math.random()*0.8
    });
  }

  // ---------- Game state ----------
  const world = { w: 2400, h: 2400 };
  const player = {
    x: world.w/2, y: world.h/2, r: 16,
    speed: 210, hp: 100, maxHp: 100,
    facing: {x:1,y:0},
    attackCooldown: 0, shootRate: 0.28, shootDmg: 16, shootSpeed: 560, shootRange: 460, aimRange: 480,
    invuln: 0, hitFlash:0
  };
  let enemies = [];
  let slashes = [];
  let projectiles = [];
  let particles = [];
  let score = 0;
  let wave = 1;
  let waveTimer = 0;
  let spawnTimer = 0;
  let running = false;
  let gameOver = false;
  let camX=0, camY=0;
  let shake = 0;

  // ---------- Difficulty ----------
  let difficulty = 'easy';
  diffButtons.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      difficulty = btn.dataset.diff;
      diffButtons.forEach(b=> b.classList.toggle('selected', b===btn));
    });
    btn.addEventListener('touchstart', e=>{
      e.preventDefault();
      difficulty = btn.dataset.diff;
      diffButtons.forEach(b=> b.classList.toggle('selected', b===btn));
    }, {passive:false});
  });

  // ---------- World border (area widens as waves progress, line stays fixed) ----------
  const BASE_WORLD = 2400;
  const BORDER_WIDTH = 10; // fixed border line thickness
  function worldSizeForWave(w){
    // world grows a bit each wave so there's more room to roam
    return BASE_WORLD + (w-1)*90;
  }
  function borderWidthForWave(w){
    return BORDER_WIDTH;
  }

  const keys = {};
  let shootHeld = false;
  window.addEventListener('keydown', e=>{
    keys[e.key.toLowerCase()] = true;
    if(e.key===' ') { e.preventDefault(); shootHeld = true; }
  });
  window.addEventListener('keyup', e=>{
    keys[e.key.toLowerCase()] = false;
    if(e.key===' ') shootHeld = false;
  });

  let mouseDown=false, mouseX=0, mouseY=0;
  canvas.addEventListener('mousemove', e=>{
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX-rect.left; mouseY = e.clientY-rect.top;
  });
  canvas.addEventListener('mousedown', e=>{
    mouseDown = true;
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX-rect.left; mouseY = e.clientY-rect.top;
  });
  window.addEventListener('mouseup', ()=> mouseDown=false);

  // joystick — built on raw Touch Events instead of Pointer Events.
  // Touch Events keep delivering to the element where the finger first
  // landed for the whole gesture (implicit capture), which is exactly
  // what a drag-based joystick needs and is far more reliably supported
  // across mobile browsers than Pointer Events + setPointerCapture.
  let joyVec={x:0,y:0}, joyTouchId=null, joyMouseActive=false;
  const joyCenter = 75; // half of #joyZone's 150px width
  function joyReset(){
    joyStick.style.left = (joyCenter-28)+'px';
    joyStick.style.top = (joyCenter-28)+'px';
  }
  joyReset();
  function joyHandle(clientX, clientY){
    const rect = joyZone.getBoundingClientRect();
    const cx = rect.left+rect.width/2, cy = rect.top+rect.height/2;
    let dx = clientX-cx, dy = clientY-cy;
    const maxD = rect.width/2;
    const dist = Math.min(Math.hypot(dx,dy), maxD);
    const ang = Math.atan2(dy,dx);
    const nx = Math.cos(ang)*dist, ny = Math.sin(ang)*dist;
    joyStick.style.left = (joyCenter-28+nx)+'px';
    joyStick.style.top = (joyCenter-28+ny)+'px';
    joyVec.x = nx/maxD; joyVec.y = ny/maxD;
  }
  function findTouch(list, id){
    for(let i=0;i<list.length;i++){ if(list[i].identifier===id) return list[i]; }
    return null;
  }

  joyZone.addEventListener('touchstart', e=>{
    if(joyTouchId!==null) return; // already tracking a finger, ignore extra ones
    const t = e.changedTouches[0];
    joyTouchId = t.identifier;
    joyHandle(t.clientX, t.clientY);
    e.preventDefault();
  }, {passive:false});

  window.addEventListener('touchmove', e=>{
    if(joyTouchId===null) return;
    const t = findTouch(e.touches, joyTouchId) || findTouch(e.changedTouches, joyTouchId);
    if(!t) return;
    joyHandle(t.clientX, t.clientY);
    e.preventDefault();
  }, {passive:false});

  function joyTouchEnd(e){
    if(joyTouchId===null) return;
    const t = findTouch(e.changedTouches, joyTouchId);
    if(!t) return;
    joyTouchId = null; joyVec.x=0; joyVec.y=0; joyReset();
  }
  window.addEventListener('touchend', joyTouchEnd);
  window.addEventListener('touchcancel', joyTouchEnd);

  // mouse drag fallback (hybrid touch+mouse laptops, or desktop testing)
  joyZone.addEventListener('mousedown', e=>{
    joyMouseActive = true;
    joyHandle(e.clientX, e.clientY);
    e.preventDefault();
  });
  window.addEventListener('mousemove', e=>{
    if(!joyMouseActive) return;
    joyHandle(e.clientX, e.clientY);
  });
  window.addEventListener('mouseup', ()=>{
    if(!joyMouseActive) return;
    joyMouseActive=false; joyVec.x=0; joyVec.y=0; joyReset();
  });

  // shoot button — Pointer Events avoid the double-fire / missed-tap issues
  // touchstart+click combos have on mobile browsers. Holding it keeps firing.
  let attackHeld = false;
  function pressAttack(e){
    e.preventDefault();
    attackHeld = true;
    doAttack();
    try{ attackBtn.setPointerCapture(e.pointerId); }catch(err){}
  }
  function releaseAttack(){ attackHeld = false; }
  attackBtn.addEventListener('pointerdown', pressAttack);
  attackBtn.addEventListener('pointerup', releaseAttack);
  attackBtn.addEventListener('pointercancel', releaseAttack);
  attackBtn.addEventListener('pointerleave', releaseAttack);
  attackBtn.addEventListener('lostpointercapture', releaseAttack);
  attackBtn.addEventListener('contextmenu', e=> e.preventDefault());
  // fallback for browsers with flaky Pointer Event support on <button>
  attackBtn.addEventListener('touchstart', e=>{ e.preventDefault(); doAttack(); }, {passive:false});
  attackBtn.addEventListener('click', e=>{ e.preventDefault(); doAttack(); });

  function doAttack(){
    if(!running || gameOver) return;
    if(player.attackCooldown > 0) return;
    player.attackCooldown = player.shootRate;

    // aim at the nearest enemy in range, else use mouse (desktop) or last facing (mobile)
    let target = null, bestD = Infinity;
    for(const en of enemies){
      const d = Math.hypot(en.x-player.x, en.y-player.y);
      if(d < player.aimRange && d < bestD){ bestD = d; target = en; }
    }
    let ang;
    if(target){
      ang = Math.atan2(target.y-player.y, target.x-player.x);
    } else if(!isTouch && mouseDown){
      ang = Math.atan2((mouseY-H/2), (mouseX-W/2));
    } else {
      ang = Math.atan2(player.facing.y, player.facing.x);
    }
    player.facing = {x:Math.cos(ang), y:Math.sin(ang)};

    // muzzle flash
    slashes.push({x:player.x, y:player.y, ang, life:0.12, maxLife:0.12});

    projectiles.push({
      x: player.x + Math.cos(ang)*player.r,
      y: player.y + Math.sin(ang)*player.r,
      vx: Math.cos(ang)*player.shootSpeed,
      vy: Math.sin(ang)*player.shootSpeed,
      dmg: player.shootDmg,
      r: 6,
      life: player.shootRange / player.shootSpeed
    });

    shake = Math.max(shake, 2);
  }

  function spawnHitParticles(x,y){
    for(let i=0;i<8;i++){
      const a = Math.random()*Math.PI*2;
      particles.push({
        x, y, vx: Math.cos(a)*(60+Math.random()*80), vy: Math.sin(a)*(60+Math.random()*80),
        life: 0.4+Math.random()*0.3, maxLife:0.7, color:'#e2a83f'
      });
    }
  }

  function spawnDeathParticles(x,y){
    for(let i=0;i<14;i++){
      const a = Math.random()*Math.PI*2;
      particles.push({
        x, y, vx: Math.cos(a)*(40+Math.random()*100), vy: Math.sin(a)*(40+Math.random()*100),
        life: 0.5+Math.random()*0.4, maxLife:0.9, color: Math.random()<0.5?'#4f8b5a':'#2f5d3a'
      });
    }
  }

  function spawnEnemy(){
    const edge = Math.floor(Math.random()*4);
    const margin = 60;
    let x,y;
    const viewR = 520;
    if(edge===0){ x = player.x + (Math.random()*2-1)*viewR; y = player.y - viewR - margin; }
    else if(edge===1){ x = player.x + (Math.random()*2-1)*viewR; y = player.y + viewR + margin; }
    else if(edge===2){ x = player.x - viewR - margin; y = player.y + (Math.random()*2-1)*viewR; }
    else { x = player.x + viewR + margin; y = player.y + (Math.random()*2-1)*viewR; }
    x = Math.max(30, Math.min(world.w-30, x));
    y = Math.max(30, Math.min(world.h-30, y));

    const elite = Math.random() < Math.min(0.08 + wave*0.02, 0.35);
    const sizeMul = difficulty==='hard' ? 1.7 : 1;
    const hpMul = difficulty==='hard' ? 1.6 : 1;
    const dmgMul = difficulty==='hard' ? 1.3 : 1;
    const spdMul = difficulty==='hard' ? 0.9 : 1; // bigger monsters, slightly slower
    const baseR = elite?20:14;
    const baseHp = elite? 70+wave*8 : 34+wave*4;
    enemies.push({
      x, y, r: baseR*sizeMul,
      hp: baseHp*hpMul,
      maxHp: baseHp*hpMul,
      speed: (elite? (60+Math.random()*20) : (85+Math.random()*35))*spdMul,
      dmg: (elite? 16 : 9)*dmgMul,
      hitFlash:0, elite,
      wobble: Math.random()*Math.PI*2
    });
  }

  function reset(){
    wave = 1;
    world.w = worldSizeForWave(wave);
    world.h = worldSizeForWave(wave);
    player.x = world.w/2; player.y = world.h/2;
    player.hp = player.maxHp;
    player.attackCooldown = 0; player.invuln = 1;
    enemies = []; slashes = []; projectiles = []; particles = [];
    score = 0; waveTimer = 0; spawnTimer = 0;
    gameOver = false;
  }

  function startGame(){
    reset();
    running = true;
    centerMsg.classList.add('hidden');
    updateHud();
  }
  startBtn.addEventListener('click', startGame);
  startBtn.addEventListener('touchstart', e=>{ e.preventDefault(); startGame(); }, {passive:false});

  function updateHud(){
    hpBar.style.width = Math.max(0, (player.hp/player.maxHp*100)) + '%';
    scoreVal.textContent = score;
    waveTag.textContent = 'GELOMBANG ' + wave;
  }

  // ---------- update loop ----------
  let last = performance.now();
  function loop(now){
    const dt = Math.min((now-last)/1000, 0.05);
    last = now;
    if(running && !gameOver) update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function update(dt){
    // movement input
    let mx=0, my=0;
    if(keys['w']||keys['arrowup']) my -= 1;
    if(keys['s']||keys['arrowdown']) my += 1;
    if(keys['a']||keys['arrowleft']) mx -= 1;
    if(keys['d']||keys['arrowright']) mx += 1;
    if(isTouch){ mx += joyVec.x; my += joyVec.y; }
    const mlen = Math.hypot(mx,my);
    if(mlen > 1){ mx/=mlen; my/=mlen; }
    if(mlen > 0.05){
      player.facing = {x:mx, y:my};
    }
    player.x += mx*player.speed*dt;
    player.y += my*player.speed*dt;
    player.x = Math.max(20, Math.min(world.w-20, player.x));
    player.y = Math.max(20, Math.min(world.h-20, player.y));

    if(player.attackCooldown>0) player.attackCooldown -= dt;
    if(player.invuln>0) player.invuln -= dt;
    if(player.hitFlash>0) player.hitFlash -= dt;

    if((shootHeld || mouseDown || attackHeld) && player.attackCooldown<=0){
      doAttack();
    }

    // wave / spawn logic
    waveTimer += dt;
    spawnTimer -= dt;
    const spawnInterval = Math.max(0.5, 1.8 - wave*0.09);
    if(spawnTimer <= 0 && enemies.length < 10+wave){
      spawnEnemy();
      spawnTimer = spawnInterval;
    }
    if(waveTimer > 16){
      wave++;
      waveTimer = 0;
      world.w = worldSizeForWave(wave);
      world.h = worldSizeForWave(wave);
      updateHud();
    }

    // enemies
    for(const en of enemies){
      const dx = player.x-en.x, dy = player.y-en.y;
      const d = Math.hypot(dx,dy) || 1;
      en.wobble += dt*6;
      const wob = Math.sin(en.wobble)*0.15;
      en.x += (dx/d + wob)*en.speed*dt;
      en.y += (dy/d)*en.speed*dt;
      if(en.hitFlash>0) en.hitFlash -= dt;

      if(d < en.r+player.r && player.invuln<=0){
        player.hp -= en.dmg;
        player.invuln = 0.6;
        player.hitFlash = 0.3;
        shake = 8;
        if(player.hp <= 0){
          player.hp = 0;
          endGame();
        }
      }
    }

    // remove dead enemies
    enemies = enemies.filter(en=>{
      if(en.hp <= 0){
        score += en.elite ? 30 : 10;
        spawnDeathParticles(en.x, en.y);
        return false;
      }
      return true;
    });

    // slashes (muzzle flash)
    slashes.forEach(s=> s.life -= dt);
    slashes = slashes.filter(s=> s.life>0);

    // projectiles
    for(const p of projectiles){
      p.x += p.vx*dt; p.y += p.vy*dt;
      p.life -= dt;
      if(p.hit) continue;
      for(const en of enemies){
        const d = Math.hypot(en.x-p.x, en.y-p.y);
        if(d <= en.r+p.r){
          en.hp -= p.dmg;
          en.hitFlash = 0.15;
          const a = Math.atan2(en.y-p.y, en.x-p.x);
          en.x += Math.cos(a)*5; en.y += Math.sin(a)*5;
          spawnHitParticles(p.x, p.y);
          p.hit = true;
          p.life = 0;
          break;
        }
      }
    }
    projectiles = projectiles.filter(p=> p.life>0);

    // particles
    particles.forEach(p=>{
      p.x += p.vx*dt; p.y += p.vy*dt;
      p.vx *= 0.9; p.vy *= 0.9;
      p.life -= dt;
    });
    particles = particles.filter(p=> p.life>0);

    fireflies.forEach(f=>{ f.t += dt*f.speed; });

    camX = player.x - W/2;
    camY = player.y - H/2;

    if(shake>0) shake = Math.max(0, shake - dt*20);

    updateHud();
  }

  function endGame(){
    gameOver = true;
    running = false;
    msgTitle.textContent = 'POHON SUCI GUGUR';
    msgSub.textContent = 'Skor akhir: ' + score + '  ·  Bertahan sampai gelombang ' + wave;
    msgSub2.textContent = '';
    startBtn.textContent = 'COBA LAGI';
    centerMsg.classList.remove('hidden');
  }

  // ---------- draw ----------
  function draw(){
    ctx.clearRect(0,0,W,H);

    let sx=0, sy=0;
    if(shake>0){
      sx = (Math.random()*2-1)*shake;
      sy = (Math.random()*2-1)*shake;
    }
    ctx.save();
    ctx.translate(sx,sy);

    // sky/forest floor base gradient
    const grad = ctx.createRadialGradient(W/2,H/2,50, W/2,H/2, Math.max(W,H)*0.75);
    grad.addColorStop(0, '#1c3a24');
    grad.addColorStop(1, '#050d08');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    // ground texture: subtle grid of grass tufts
    ctx.save();
    ctx.translate(-camX*0.9, -camY*0.9);
    ctx.strokeStyle = 'rgba(79,139,90,0.08)';
    ctx.lineWidth = 1;
    const gridSize = 80;
    const startX = Math.floor(camX/gridSize)*gridSize - gridSize;
    const startY = Math.floor(camY/gridSize)*gridSize - gridSize;
    for(let gx=startX; gx<camX+W+gridSize; gx+=gridSize){
      ctx.beginPath(); ctx.moveTo(gx, camY-40); ctx.lineTo(gx, camY+H+40); ctx.stroke();
    }
    for(let gy=startY; gy<camY+H+gridSize; gy+=gridSize){
      ctx.beginPath(); ctx.moveTo(camX-40, gy); ctx.lineTo(camX+W+40, gy); ctx.stroke();
    }
    ctx.restore();

    // trees (parallax layers, back to front)
    for(let layer=0; layer<3; layer++){
      const parallax = 0.5 + layer*0.25;
      ctx.save();
      ctx.translate(-camX*parallax, -camY*parallax);
      for(const t of trees){
        if(t.layer !== layer) continue;
        const tx = t.x, ty = t.y;
        if(tx < camX*parallax-100 || tx > camX*parallax+W+100 || ty < camY*parallax-100 || ty > camY*parallax+H+100) continue;
        drawTree(tx,ty,t.r,layer);
      }
      ctx.restore();
    }

    // fireflies (background ambience)
    ctx.save();
    ctx.translate(-camX*0.8, -camY*0.8);
    for(const f of fireflies){
      const fx = f.x + Math.cos(f.t)*30;
      const fy = f.y + Math.sin(f.t*1.3)*20;
      if(fx < camX*0.8-50 || fx > camX*0.8+W+50) continue;
      const glow = (Math.sin(f.t*2)+1)/2;
      ctx.fillStyle = `rgba(226,168,63,${0.3+glow*0.5})`;
      ctx.beginPath(); ctx.arc(fx,fy,2+glow*1.5,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();

    // world-space entities
    ctx.save();
    ctx.translate(-camX, -camY);

    drawWorldBorder();

    // muzzle flash
    for(const s of slashes){
      const t = 1 - s.life/s.maxLife;
      ctx.save();
      ctx.translate(s.x + Math.cos(s.ang)*20, s.y + Math.sin(s.ang)*20);
      ctx.globalAlpha = 1-t;
      const g = ctx.createRadialGradient(0,0,0, 0,0,14);
      g.addColorStop(0,'rgba(255,236,180,0.9)');
      g.addColorStop(1,'rgba(226,168,63,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(0,0,14*(1-t*0.4),0,Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // projectiles (glowing bolts with a short trail)
    for(const p of projectiles){
      const ang = Math.atan2(p.vy, p.vx);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(ang);
      const trail = ctx.createLinearGradient(-22,0,0,0);
      trail.addColorStop(0,'rgba(226,168,63,0)');
      trail.addColorStop(1,'rgba(255,236,180,0.9)');
      ctx.fillStyle = trail;
      ctx.fillRect(-22,-2.5,22,5);
      ctx.fillStyle = '#fff3d6';
      ctx.beginPath(); ctx.arc(0,0,4.5,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // enemies
    for(const en of enemies){
      drawEnemy(en);
    }

    // player
    drawPlayer();

    // particles
    for(const p of particles){
      ctx.globalAlpha = Math.max(0, p.life/p.maxLife);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }

    ctx.restore(); // world space

    // vignette
    const vg = ctx.createRadialGradient(W/2,H/2,H*0.3, W/2,H/2,H*0.75);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,'rgba(0,0,0,0.55)');
    ctx.fillStyle = vg;
    ctx.fillRect(0,0,W,H);

    // damage flash
    if(player.hitFlash>0){
      ctx.fillStyle = `rgba(194,59,59,${player.hitFlash*0.5})`;
      ctx.fillRect(0,0,W,H);
    }

    ctx.restore(); // shake
  }

  function drawWorldBorder(){
    const bw = borderWidthForWave(wave);
    ctx.save();
    // soft glow behind the border
    ctx.shadowColor = 'rgba(226,168,63,0.55)';
    ctx.shadowBlur = 10 + bw*0.5;
    ctx.strokeStyle = '#e2a83f';
    ctx.lineWidth = bw;
    ctx.strokeRect(bw/2, bw/2, world.w-bw, world.h-bw);
    ctx.shadowBlur = 0;
    // inner darker accent line for a carved look
    ctx.strokeStyle = 'rgba(13,31,20,0.6)';
    ctx.lineWidth = Math.max(2, bw*0.25);
    ctx.strokeRect(bw + ctx.lineWidth/2, bw + ctx.lineWidth/2, world.w-2*bw-ctx.lineWidth, world.h-2*bw-ctx.lineWidth);
    ctx.restore();
  }

  function drawTree(x,y,r,layer){
    const hueSets = [
      {trunk:'#1a2e1c', leaf:'#0f2415'},
      {trunk:'#20361f', leaf:'#173e22'},
      {trunk:'#2b3f24', leaf:'#2f5d3a'}
    ];
    const c = hueSets[layer];
    ctx.fillStyle = c.trunk;
    ctx.fillRect(x-r*0.08, y, r*0.16, r*0.6);
    ctx.fillStyle = c.leaf;
    ctx.beginPath();
    ctx.moveTo(x, y-r*1.4);
    ctx.lineTo(x+r*0.75, y+r*0.15);
    ctx.lineTo(x-r*0.75, y+r*0.15);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x, y-r*0.85);
    ctx.lineTo(x+r*0.6, y+r*0.35);
    ctx.lineTo(x-r*0.6, y+r*0.35);
    ctx.closePath();
    ctx.fill();
  }

  function drawPlayer(){
    ctx.save();
    ctx.translate(player.x, player.y);
    const ang = Math.atan2(player.facing.y, player.facing.x);

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(0, player.r*0.8, player.r*0.9, player.r*0.4, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.rotate(ang);
    // body
    const flash = player.invuln>0 && Math.floor(player.invuln*20)%2===0;
    ctx.fillStyle = flash ? '#ffffff' : '#e2a83f';
    ctx.beginPath();
    ctx.arc(0,0,player.r,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#3a2410';
    ctx.lineWidth = 2;
    ctx.stroke();
    // cloak point (direction indicator)
    ctx.fillStyle = '#7a4a1f';
    ctx.beginPath();
    ctx.moveTo(player.r*0.2, -player.r*0.6);
    ctx.lineTo(player.r*1.5, 0);
    ctx.lineTo(player.r*0.2, player.r*0.6);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawEnemy(en){
    ctx.save();
    ctx.translate(en.x, en.y);

    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(0, en.r*0.8, en.r*0.9, en.r*0.35, 0, 0, Math.PI*2);
    ctx.fill();

    const baseColor = en.elite ? '#7a2b3d' : '#2c2418';
    ctx.fillStyle = en.hitFlash>0 ? '#ffffff' : baseColor;
    ctx.beginPath();
    ctx.arc(0,0,en.r,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = en.elite ? '#e2a83f' : '#000000';
    ctx.lineWidth = en.elite?2.5:1.5;
    ctx.stroke();

    // eyes
    ctx.fillStyle = en.elite ? '#ffe08a' : '#c23b3b';
    ctx.beginPath(); ctx.arc(-en.r*0.35,-en.r*0.15,2.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(en.r*0.35,-en.r*0.15,2.2,0,Math.PI*2); ctx.fill();

    // hp bar
    const w = en.r*2.2;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(-w/2, -en.r-12, w, 5);
    ctx.fillStyle = en.elite ? '#e2a83f' : '#c23b3b';
    ctx.fillRect(-w/2, -en.r-12, w*Math.max(0,en.hp/en.maxHp), 5);

    ctx.restore();
  }

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
